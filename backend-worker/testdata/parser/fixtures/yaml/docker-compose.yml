version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NODE_ENV: production
    image: acme/web-dashboard:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://app:secret@db:5432/dashboard
      - REDIS_URL=redis://cache:6379/0
      - API_BASE_URL=http://api:8080
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: acme/api-service:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://app:secret@db:5432/dashboard
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: dashboard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://app:secret@db:5432/dashboard
      - REDIS_URL=redis://cache:6379/0
      - WORKER_CONCURRENCY=4
    depends_on:
      - db
      - cache

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: acme-network
