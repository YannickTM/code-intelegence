openapi: 3.0.3
info:
  title: MYJUNGLE Backend API
  version: 1.3.0
  description: |
    Contract for backoffice and MCP integrations.
    This document tracks the current `backend-api` router surface, including:
    session auth, platform management, SSH/API key management, project analysis,
    commit history, SSE streams, and both embedding and LLM provider settings.

    ## Error Status Codes
    - `400` - invalid JSON body or malformed query/path parameters
    - `401` - authentication required or invalid credentials
    - `403` - insufficient permissions
    - `404` - resource not found
    - `409` - conflict
    - `413` - request body too large
    - `422` - validation error
    - `500` - internal server error
    - `502` - upstream dependency unavailable
servers:
  - url: http://localhost:8080
    description: Local
security:
  - BearerAuth: []
  - CookieAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Projects
  - name: Members
  - name: SSH Keys
  - name: API Keys
  - name: Providers
  - name: Platform Management
  - name: Settings
  - name: Indexing
  - name: Query
  - name: Commits
  - name: Dashboard
  - name: Events

paths:
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus metrics payload
          content:
            text/plain:
              schema:
                type: string

  /v1/users:
    post:
      tags: [Auth]
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      description: |
        Phase 1 uses username-only authentication on trusted local networks.
        Creates a server-side session and returns the raw token plus a Set-Cookie header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (`mj_session`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      description: Destroys the current session and clears the session cookie.
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      description: Returns the current user profile and platform roles.
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Users]
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/me/projects:
    get:
      tags: [Users]
      operationId: listCurrentUserProjects
      description: Lists the current user's visible projects, including project health fields.
      responses:
        "200":
          description: Projects visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProjectListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/lookup:
    get:
      tags: [Users]
      operationId: lookupUser
      description: Resolves a user by username first, then by email.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matched user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLookupResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/me/keys:
    get:
      tags: [API Keys]
      operationId: listPersonalKeys
      responses:
        "200":
          description: Active personal API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [API Keys]
      operationId: createPersonalKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: Personal key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/me/keys/{key_id}:
    parameters:
      - $ref: "#/components/parameters/APIKeyID"
    delete:
      tags: [API Keys]
      operationId: deletePersonalKey
      responses:
        "204":
          description: Personal key deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/ssh-keys:
    get:
      tags: [SSH Keys]
      operationId: listSSHKeys
      responses:
        "200":
          description: SSH keys owned by the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [SSH Keys]
      operationId: createSSHKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSSHKeyRequest"
      responses:
        "201":
          description: SSH key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKey"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/ssh-keys/{ssh_key_id}:
    parameters:
      - $ref: "#/components/parameters/SSHKeyID"
    get:
      tags: [SSH Keys]
      operationId: getSSHKey
      responses:
        "200":
          description: SSH key detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKey"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/ssh-keys/{ssh_key_id}/projects:
    parameters:
      - $ref: "#/components/parameters/SSHKeyID"
    get:
      tags: [SSH Keys]
      operationId: listSSHKeyProjects
      responses:
        "200":
          description: Projects currently assigned to the SSH key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyProjectListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/ssh-keys/{ssh_key_id}/retire:
    parameters:
      - $ref: "#/components/parameters/SSHKeyID"
    post:
      tags: [SSH Keys]
      operationId: retireSSHKey
      responses:
        "200":
          description: SSH key retired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKey"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects:
    get:
      tags: [Projects]
      operationId: listProjects
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Projects the current user belongs to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Projects]
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [Projects]
      operationId: getProject
      responses:
        "200":
          description: Project detail including indexing health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectHealth"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Projects]
      operationId: updateProject
      description: User session required. Project admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Projects]
      operationId: deleteProject
      description: User session required. Project owner role required.
      responses:
        "204":
          description: Project deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}/ssh-key:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [Projects]
      operationId: getProjectSSHKey
      responses:
        "200":
          description: Assigned SSH key summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeySummary"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Projects]
      operationId: setProjectSSHKey
      description: User session required. Project admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignProjectSSHKeyRequest"
      responses:
        "200":
          description: SSH key assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeySummary"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Projects]
      operationId: removeProjectSSHKey
      description: User session required. Project admin role required.
      responses:
        "204":
          description: SSH key assignment removed
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [Members]
      operationId: listProjectMembers
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Members]
      operationId: addProjectMember
      description: User session required. Project admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberWithUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}/members/{user_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/UserID"
    patch:
      tags: [Members]
      operationId: updateProjectMemberRole
      description: User session required. Project admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberWithUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Members]
      operationId: removeProjectMember
      description: User session required. Members may remove themselves; stronger removals are enforced server-side.
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}/keys:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [API Keys]
      operationId: listProjectKeys
      description: User session required. Project admin role required.
      responses:
        "200":
          description: Project API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [API Keys]
      operationId: createProjectKey
      description: User session required. Project admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: Project key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/projects/{project_id}/keys/{key_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/APIKeyID"
    delete:
      tags: [API Keys]
      operationId: deleteProjectKey
      description: User session required. Project admin role required.
      responses:
        "204":
          description: Project key deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/settings/providers:
    get:
      tags: [Providers]
      operationId: listSupportedProviders
      responses:
        "200":
          description: Provider IDs exposed by the backend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCatalogResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/platform-management/users:
    get:
      tags: [Platform Management]
      operationId: listPlatformUsers
      description: User session plus `platform_admin` role required.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: is_active
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [username, created_at]
            default: created_at
      responses:
        "200":
          description: Platform user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /v1/platform-management/users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserID"
    get:
      tags: [Platform Management]
      operationId: getPlatformUser
      description: User session plus `platform_admin` role required.
      responses:
        "200":
          description: Platform user detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetailResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Platform Management]
      operationId: updatePlatformUser
      description: User session plus `platform_admin` role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlatformUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/platform-management/users/{user_id}/deactivate:
    parameters:
      - $ref: "#/components/parameters/UserID"
    post:
      tags: [Platform Management]
      operationId: deactivatePlatformUser
      description: User session plus `platform_admin` role required.
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/platform-management/users/{user_id}/activate:
    parameters:
      - $ref: "#/components/parameters/UserID"
    post:
      tags: [Platform Management]
      operationId: activatePlatformUser
      description: User session plus `platform_admin` role required.
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"

  /v1/platform-management/platform-roles:
    get:
      tags: [Platform Management]
      operationId: listPlatformRoles
      description: User session plus `platform_admin` role required.
      responses:
        "200":
          description: Active platform role assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformRoleListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Platform Management]
      operationId: grantPlatformRole
      description: User session plus `platform_admin` role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantPlatformRoleRequest"
      responses:
        "201":
          description: Platform role granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformRoleGrantResponse"
        "200":
          description: Platform role was already present
          content:
