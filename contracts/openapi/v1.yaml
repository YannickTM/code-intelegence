components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Session token or API key via the `Authorization` header
    CookieAuth:
      type: apiKey
      in: cookie
      name: mj_session
      description: Session cookie set by `POST /v1/auth/login`

  parameters:
    ProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
    SymbolID:
      in: path
      name: symbol_id
      required: true
      schema:
        type: string
        format: uuid
    SSHKeyID:
      in: path
      name: ssh_key_id
      required: true
      schema:
        type: string
        format: uuid
    APIKeyID:
      in: path
      name: key_id
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
        format: uuid
    ConfigID:
      in: path
      name: config_id
      required: true
      schema:
        type: string
        format: uuid
    CommitHash:
      in: path
      name: commit_hash
      required: true
      schema:
        type: string
    PlatformRole:
      in: path
      name: role
      required: true
      schema:
        type: string
        enum: [platform_admin]

  responses:
    ErrorResponse:
      description: Structured error payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              latency_ms:
                type: integer
              error:
                type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    UserActionResponse:
      type: object
      required: [message, user_id]
      properties:
        message:
          type: string
        user_id:
          type: string
          format: uuid

    PlatformRoleActionResponse:
      type: object
      required: [message, user_id, role]
      properties:
        message:
          type: string
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [platform_admin]

    ConfigActionResponse:
      type: object
      required: [message, config_id]
      properties:
        message:
          type: string
        config_id:
          type: string
          format: uuid

    LoginRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string

    User:
      type: object
      required: [id, username, email, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BasicUserProfile:
      type: object
      required: [id, username, email]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri

    UserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    CurrentUserResponse:
      type: object
      required: [user, platform_roles]
      properties:
        user:
          $ref: "#/components/schemas/User"
        platform_roles:
          type: array
          items:
            type: string

    UserLookupResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/BasicUserProfile"

    LoginResponse:
      type: object
      required: [token, expires_at, user]
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    RegisterUserRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string

    UpdateCurrentUserRequest:
      type: object
      description: At least one field must be provided.
      properties:
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri
          description: Pass an empty string to clear the avatar.
        email:
          type: string
          format: email

    UpdatePlatformUserRequest:
      type: object
      description: At least one field must be provided.
      properties:
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri

    Project:
      type: object
      required: [id, name, repo_url, default_branch, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        repo_url:
          type: string
        default_branch:
          type: string
        status:
          type: string
          enum: [active, paused]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectHealth:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            role:
              type: string
              enum: [owner, admin, member]
            index_git_commit:
              type: string
            index_branch:
              type: string
            index_activated_at:
              type: string
              format: date-time
              nullable: true
            active_job_id:
              type: string
              format: uuid
              nullable: true
            active_job_status:
              type: string
              nullable: true
            failed_job_id:
              type: string
              format: uuid
              nullable: true
            failed_job_finished_at:
              type: string
              format: date-time
              nullable: true
            failed_job_type:
              type: string
              nullable: true

    ProjectListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    UserProjectListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectHealth"

    CreateProjectRequest:
      type: object
      required: [name, repo_url, ssh_key_id]
      properties:
        name:
          type: string
          maxLength: 100
        repo_url:
          type: string
        default_branch:
          type: string
        status:
          type: string
          enum: [active, paused]
        ssh_key_id:
          type: string
          format: uuid

    CreateProjectResponse:
      type: object
      required: [id, name, repo_url, default_branch, status, ssh_key]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        repo_url:
          type: string
        default_branch:
          type: string
        status:
          type: string
          enum: [active, paused]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ssh_key:
          $ref: "#/components/schemas/SSHKeySummary"

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        repo_url:
          type: string
        default_branch:
          type: string
        status:
          type: string
          enum: [active, paused]

    ProjectMemberWithUser:
      type: object
      required: [id, project_id, user_id, username, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri
        role:
          type: string
          enum: [owner, admin, member]
        created_at:
          type: string
          format: date-time

    ProjectMemberListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMemberWithUser"

    AddMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, member]
          default: member

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, admin, member]

    SSHKeySummary:
      type: object
      required: [id, name, fingerprint, public_key, key_type, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        fingerprint:
          type: string
        public_key:
          type: string
        key_type:
          type: string
        created_at:
          type: string
          format: date-time

    SSHKey:
      allOf:
        - $ref: "#/components/schemas/SSHKeySummary"
        - type: object
          properties:
            is_active:
              type: boolean
            created_by:
              type: string
              format: uuid
            rotated_at:
              type: string
              format: date-time
              nullable: true

    SSHKeyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SSHKey"

    SSHKeyProjectListResponse:
      type: object
      required: [items, total]
